openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: summarize
    description: Text summarization operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /summarize:
    post:
      operationId: summarizeText
      tags: [summarize]
      summary: Summarize text
      description: Generates a concise summary of the provided text using an AI model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeRequest"
      responses:
        "200":
          description: Summary generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SummarizeRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 50
          maxLength: 50000
          description: The source text to summarize.
        length:
          type: string
          enum: [short, medium, long]
          default: medium
          description: Approximate desired length of the summary.
        format:
          type: string
          enum: [paragraph, bullets]
          default: paragraph
          description: Output format — flowing paragraph or bullet list.
        tone:
          type: string
          enum: [neutral, formal, casual, academic]
          default: neutral
          description: Tone of the summary.
      required:
        - text
    SummarizeResponse:
      type: object
      properties:
        summary:
          type: string
          description: The generated summary.
        format:
          type: string
          enum: [paragraph, bullets]
        length:
          type: string
          enum: [short, medium, long]
        tone:
          type: string
          enum: [neutral, formal, casual, academic]
        sourceWordCount:
          type: integer
        summaryWordCount:
          type: integer
        compressionRatio:
          type: number
          description: summaryWordCount / sourceWordCount
        model:
          type: string
        durationMs:
          type: integer
      required:
        - summary
        - format
        - length
        - tone
        - sourceWordCount
        - summaryWordCount
        - compressionRatio
        - model
        - durationMs
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
