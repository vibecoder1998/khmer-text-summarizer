openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: summarize
    description: Text summarization operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /extract-url:
    post:
      operationId: extractUrl
      tags: [summarize]
      summary: Extract readable text from a URL
      description: Fetches a web page and extracts its main article text using Readability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractUrlRequest"
      responses:
        "200":
          description: Extracted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedArticle"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to fetch or parse URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /summarize:
    post:
      operationId: summarizeText
      tags: [summarize]
      summary: Summarize text
      description: Generates a concise summary of the provided text using an AI model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeRequest"
      responses:
        "200":
          description: Summary generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SummarizeRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 50
          maxLength: 50000
          description: The source text to summarize.
        model:
          type: string
          enum: [mt5-base, gemma-4-4b, gemini]
          default: mt5-base
          description: Which underlying model to use.
        format:
          type: string
          enum: [paragraph, bullets]
          default: paragraph
          description: Output format — flowing paragraph or bullet list.
        length:
          type: string
          enum: [short, long]
          default: short
          description: Desired summary length (gemma-4-4b and gemini only).
        summarizeType:
          type: string
          enum: [general, meeting-minutes]
          default: general
          description: Summary style — general overview or structured meeting minutes (gemma-4-4b and gemini only).
        numBeams:
          type: integer
          minimum: 1
          maximum: 8
          default: 4
          description: Beam search width (mT5-base only). Higher = better quality, slower.
        maxNewTokens:
          type: integer
          minimum: 32
          maximum: 1024
          default: 256
          description: Maximum tokens to generate (mT5-base only).
        maxLength:
          type: integer
          minimum: 64
          maximum: 1024
          default: 512
          description: Maximum summary length in tokens (gemma-4-4b only).
      required:
        - text
    SummarizeResponse:
      type: object
      properties:
        summary:
          type: string
          description: The generated summary.
        format:
          type: string
          enum: [paragraph, bullets]
        model:
          type: string
        sourceWordCount:
          type: integer
        summaryWordCount:
          type: integer
        compressionRatio:
          type: number
          description: summaryWordCount / sourceWordCount
        durationMs:
          type: integer
      required:
        - summary
        - format
        - model
        - sourceWordCount
        - summaryWordCount
        - compressionRatio
        - durationMs
    ExtractUrlRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: HTTP(S) URL of the page to extract.
      required:
        - url
    ExtractedArticle:
      type: object
      properties:
        title:
          type: string
        text:
          type: string
          description: Extracted plain text content.
        siteName:
          type: string
        excerpt:
          type: string
        url:
          type: string
        wordCount:
          type: integer
      required:
        - text
        - url
        - wordCount
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
